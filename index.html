<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ניצוץ — עורך משחק</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@300;400;500;700;900&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;min-height:100%;font-family:'Heebo',system-ui,sans-serif;user-select:none;-webkit-user-select:none;background:#000;color:#e0e0f0}
body{overflow-y:auto}
html.mode-game,html.mode-game body,html.mode-game #root{overflow:hidden;position:fixed;width:100%;height:100%;height:100dvh;touch-action:none;overscroll-behavior:none}
a,button,input,textarea{-webkit-tap-highlight-color:transparent}

/* ═══ WELCOME ═══ */
#welcomeScreen{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:clamp(24px,6vmin,48px);background:#000}
.welcome-logo{width:clamp(180px,46vmin,340px);max-height:48dvh;height:auto;object-fit:contain;display:block;margin:0 auto 14px;pointer-events:none;user-select:none;-webkit-user-drag:none}
#welcomeScreen h1{font-size:clamp(32px,6vmin,52px);margin-bottom:10px;color:#e8e4f8;font-weight:800;letter-spacing:-.5px}
#welcomeScreen .sub{font-size:clamp(14px,1.8vmin,17px);color:#6a6e84;margin-bottom:clamp(36px,6vmin,56px);max-width:440px;line-height:1.8}
.welcome-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
@media(min-width:600px){.welcome-btns{flex-direction:row;max-width:440px;gap:16px}}
.w-btn{padding:16px 24px;font-size:clamp(15px,1.8vmin,17px);border:none;border-radius:14px;cursor:pointer;font-weight:700;transition:transform .15s,box-shadow .2s;font-family:inherit;letter-spacing:.3px;width:100%;min-height:54px;display:flex;align-items:center;justify-content:center;gap:8px}
.w-btn:active{transform:scale(.96)}
.w-btn-play{background:rgba(255,255,255,.05);color:#9a9ab0;border:1px solid rgba(255,255,255,.08)}
.w-btn-play:hover{background:rgba(255,255,255,.09);transform:scale(1.02)}
.w-btn-edit{background:#7c3aed;color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.25)}
.w-btn-edit:hover{background:#8b5cf6;box-shadow:0 6px 28px rgba(124,58,237,.4);transform:scale(1.02)}

/* ═══ EDITOR ═══ */
#editorScreen{min-height:100dvh;padding:0 clamp(16px,5vw,64px) clamp(32px,5vmin,56px);background:#000;max-width:800px;margin:0 auto;padding-top:68px}
.editor-topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px clamp(16px,5vw,64px);background:rgba(11,11,21,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04)}
.editor-topbar h2{font-size:clamp(15px,2.2vmin,19px);color:#e8e4f8;font-weight:700;margin:0;letter-spacing:.2px}
.editor-topbar-actions{display:flex;gap:10px}
.e-btn{padding:14px 16px;font-size:clamp(14px,1.6vmin,16px);border:none;border-radius:12px;cursor:pointer;font-weight:700;font-family:inherit;min-height:50px;transition:transform .15s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.e-btn:active{transform:scale(.96)}
.e-btn-start{background:#7c3aed;color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.25);padding:8px 24px;font-size:clamp(12px,1.5vmin,14px);min-height:38px;border-radius:10px}
.e-btn-start:hover{background:#8b5cf6;transform:scale(1.02)}
.e-btn-back{background:rgba(255,255,255,.05);color:#7a7e94;border:1px solid rgba(255,255,255,.06);padding:8px 20px;font-size:clamp(12px,1.5vmin,14px);min-height:38px;border-radius:10px}
.e-btn-back:hover{background:rgba(255,255,255,.08)}
.editor-header{text-align:center;padding:clamp(16px,3vmin,28px) 0 clamp(8px,1.5vmin,12px)}
.editor-header p{font-size:clamp(13px,1.6vmin,15px);color:#6a6e84;letter-spacing:.3px}
.editor-section{margin-bottom:clamp(20px,3.5vmin,32px);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:16px;padding:clamp(20px,3vmin,30px)}
.editor-section h3{font-size:clamp(11px,1.3vmin,12px);color:#6e7090;margin-bottom:clamp(14px,2.5vmin,22px);font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.asset-wrap{position:relative;width:100%;max-width:200px;margin:0 auto;border-radius:50%;overflow:hidden;aspect-ratio:1}
.asset-preview{width:100%;height:100%;background:#12121e;display:block;border-radius:50%;cursor:grab}
.asset-preview:active{cursor:grabbing}
.zoom-row{display:flex;align-items:center;gap:8px;margin-top:14px;max-width:220px;margin-left:auto;margin-right:auto}
.zoom-pm{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#7a7e94;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;padding:0;line-height:1;flex-shrink:0}
.zoom-pm:hover{background:rgba(255,255,255,.1);color:#c4b5fd;border-color:rgba(124,58,237,.3)}
.zoom-slider{-webkit-appearance:none;appearance:none;flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;outline:none}
.zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#7c3aed;cursor:pointer;border:2px solid rgba(255,255,255,.15)}
.zoom-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#7c3aed;cursor:pointer;border:2px solid rgba(255,255,255,.15)}
.asset-overlay{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;border-radius:50%;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,rgba(0,0,0,.25) 35%,transparent 55%);pointer-events:none}
.upload-btn{display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;font-family:inherit;line-height:1;font-weight:600;text-align:center;background:rgba(255,255,255,.12);color:rgba(255,255,255,.88);padding:6px 16px;margin-bottom:16px;font-size:clamp(11px,1.3vmin,13px);letter-spacing:.3px;transition:all .2s;border-radius:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);pointer-events:auto}
.upload-btn:hover{background:rgba(255,255,255,.22);color:#fff;border-color:rgba(255,255,255,.25)}
input[type="file"]{display:none}
.field-group{margin-bottom:22px}
.field-group:last-child{margin-bottom:0}
.field-label{display:block;font-size:clamp(12px,1.5vmin,14px);color:#9a9eb4;margin-bottom:10px;font-weight:500;letter-spacing:.2px}
.text-field{width:100%;padding:14px 18px;font-size:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;color:#d0d4e4;font-family:inherit;min-height:48px;resize:vertical;transition:border-color .2s,box-shadow .2s;line-height:1.5}
.text-field:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1);background:rgba(255,255,255,.045)}
.filter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.filter-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);border-radius:14px;cursor:pointer;font-family:inherit;transition:all .25s;min-height:70px}
.filter-card:hover{background:rgba(255,255,255,.07);transform:translateY(-1px)}
.filter-card.active{border-color:#7c3aed;background:rgba(124,58,237,.12)}
.filter-icon{font-size:24px;line-height:1}
.filter-name{font-size:clamp(11px,1.3vmin,13px);font-weight:600;color:#7a7e94;letter-spacing:.2px}
.filter-card.active .filter-name{color:#c4b5fd}
.diff-group{display:flex;gap:10px;flex-wrap:wrap}
.diff-btn{flex:1;min-width:80px;padding:12px 8px;font-size:clamp(13px,1.5vmin,15px);border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#7a7e94;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s;min-height:48px;display:flex;align-items:center;justify-content:center;gap:4px}
.diff-btn:hover{background:rgba(255,255,255,.07)}
.diff-btn.active{border-color:#7c3aed;background:rgba(124,58,237,.1);color:#c4b5fd}
.e-btn-share-full{width:100%;background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.18);padding:14px 16px;font-size:clamp(14px,1.6vmin,16px);border-radius:12px;cursor:pointer;font-weight:600;font-family:inherit;min-height:50px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.e-btn-share-full:hover{background:rgba(124,58,237,.18);border-color:rgba(124,58,237,.3)}
.share-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e2e;color:#e8e4f8;padding:12px 24px;border-radius:10px;font-size:14px;z-index:9999;opacity:0;transition:all .3s ease;pointer-events:none;border:1px solid rgba(124,58,237,.2);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ═══ GAME ═══ */
.back-to-editor{position:fixed;top:8px;left:8px;top:calc(8px + env(safe-area-inset-top,0px));left:calc(8px + env(safe-area-inset-left,0px));z-index:150;padding:8px 14px;font-size:clamp(11px,1.6vmin,14px);border:none;border-radius:8px;background:rgba(0,0,0,.5);color:rgba(255,255,255,.7);cursor:pointer;font-family:'Heebo',sans-serif;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);min-height:36px;transition:background .2s}
.back-to-editor:hover{background:rgba(0,0,0,.7);color:#fff}

/* ═══ GAME INTERNALS (from game5.html) ═══ */
.num{font-family:'Space Grotesk','Rubik',monospace;font-feature-settings:'tnum' 1}
.display-heb{font-family:'Rubik',sans-serif;font-weight:900;letter-spacing:-0.04em;line-height:1.05}
.heb-body{font-family:'Rubik',sans-serif;line-height:1.5;font-weight:400}
.hud-grid{position:absolute;top:0;left:0;right:0;z-index:20;display:grid;grid-template-columns:1fr 1fr 1fr;align-items:start;padding:clamp(.9rem,2vw,1.5rem) clamp(1rem,2.6vw,1.8rem);gap:clamp(.6rem,1.5vw,1rem);pointer-events:none}
.hud-cell{display:flex;align-items:center}
.hud-cell.center{justify-content:center}
.hud-cell.end{justify-content:flex-end}
.chip{display:flex;align-items:center;gap:.55rem;padding:clamp(.4rem,1vw,.7rem) clamp(.75rem,1.6vw,1.1rem);border-radius:14px;background:rgba(13,1,24,.55);border:1px solid rgba(255,255,255,.08);box-shadow:0 6px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(14px) saturate(150%);-webkit-backdrop-filter:blur(14px) saturate(150%)}
.chip-label{font-family:'Rubik',sans-serif;font-weight:500;font-size:clamp(.6rem,.95vw,.72rem);letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);line-height:1;margin-bottom:4px}
.chip-value{font-family:'Space Grotesk',monospace;font-weight:800;font-size:clamp(1.25rem,3vw,1.75rem);color:#fff;line-height:1;font-feature-settings:'tnum' 1}
.chip-stars-value{font-family:'Space Grotesk',monospace;font-weight:800;font-size:clamp(1.1rem,2.6vw,1.55rem);color:#fff5c0;text-shadow:0 0 8px rgba(255,200,40,.5);line-height:1}
.timer-low{color:#ff7a8c !important;text-shadow:0 0 12px rgba(255,80,110,.7);animation:timerPulse .7s ease-in-out infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.45)}100%{transform:scale(1)}}
@keyframes comboPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.game-stage{width:100vw;height:100vh;height:100dvh;position:relative;overflow:hidden;cursor:crosshair;touch-action:none}
.noise-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;mix-blend-mode:overlay;opacity:.55;z-index:15}

/* פילטרים על הסטייג' */
.fx-dream{filter:blur(.25px) saturate(.92) contrast(.96) brightness(1.06) drop-shadow(0 0 10px rgba(255,200,255,.32))}
.fx-dream::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:25;background:radial-gradient(ellipse at center,rgba(255,220,255,.14) 0%,transparent 60%);mix-blend-mode:screen}
.fx-cinema::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:25;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.55) 100%);mix-blend-mode:multiply}
.fx-cinema-classic{filter:grayscale(1) contrast(1.18) brightness(1)}
.fx-cinema-sepia  {filter:grayscale(.3) sepia(.8) contrast(1.12) brightness(1.02)}
.fx-cinema-bleach {filter:grayscale(.5) contrast(1.28) saturate(.75) brightness(1.05)}
.fx-crt{filter:saturate(1.35) contrast(1.12) brightness(1.04) drop-shadow(1.2px 0 0 rgba(255,10,80,.6)) drop-shadow(-1.2px 0 0 rgba(0,220,255,.55));animation:crtFlicker 2.2s steps(24) infinite}
.fx-crt::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:25;background:repeating-linear-gradient(0deg,rgba(0,0,0,.32) 0,rgba(0,0,0,.32) 1px,transparent 1px,transparent 3px);mix-blend-mode:multiply}
.fx-crt::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:27;background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,.72) 100%);mix-blend-mode:multiply}
@keyframes crtFlicker{0%,100%{opacity:1}12%{opacity:.92}38%{opacity:.98}52%{opacity:.88}66%{opacity:.97}84%{opacity:.94}}
@keyframes dreamPulse{0%,100%{filter:drop-shadow(0 0 6px rgba(255,180,255,.55)) drop-shadow(0 0 16px rgba(180,150,255,.32)) saturate(1.12) brightness(1.05)}50%{filter:drop-shadow(0 0 12px rgba(255,200,255,.7)) drop-shadow(0 0 28px rgba(200,170,255,.45)) saturate(1.22) brightness(1.1) hue-rotate(8deg)}}

/* גליצ'ים אופקיים אקראיים — שלושה אובדים על תזמונים שונים שמתפזרים כמו תקלות אמיתיות */
.crt-tear{position:absolute;left:0;right:0;pointer-events:none;z-index:29;mix-blend-mode:screen;opacity:0;will-change:transform,opacity}
.crt-tear-a{height:7%;background:linear-gradient(180deg,transparent,rgba(255,30,90,.55) 35%,rgba(0,220,255,.5) 65%,transparent);animation:crtTearA 13.7s infinite}
.crt-tear-b{height:2.5%;background:linear-gradient(180deg,transparent,rgba(255,255,255,.85),transparent);animation:crtTearB 7.9s infinite}
.crt-tear-c{height:13%;background:linear-gradient(180deg,transparent,rgba(255,40,200,.4) 30%,rgba(40,255,200,.4) 70%,transparent);animation:crtTearC 21.3s infinite}
@keyframes crtTearA{
  0%,6.4%,7.6%,33.1%,34.2%,33.7%,72.8%,73.5%,100%{opacity:0;transform:translate3d(0,-50vh,0)}
  6.5%{opacity:.7;transform:translate3d(-14px,32vh,0)}
  6.9%{opacity:.55;transform:translate3d(11px,32vh,0)}
  7.2%{opacity:.6;transform:translate3d(-5px,32vh,0)}
  33.3%{opacity:.65;transform:translate3d(18px,71vh,0)}
  33.6%{opacity:.5;transform:translate3d(-9px,71vh,0)}
  72.9%{opacity:.7;transform:translate3d(-22px,12vh,0)}
  73.2%{opacity:.45;transform:translate3d(7px,12vh,0)}
}
@keyframes crtTearB{
  0%,18.2%,19.6%,46.7%,47.4%,89.1%,89.6%,100%{opacity:0;transform:translate3d(0,-50vh,0)}
  18.4%{opacity:.85;transform:translate3d(20px,58vh,0)}
  18.8%{opacity:.6;transform:translate3d(-13px,58vh,0)}
  19.2%{opacity:.7;transform:translate3d(8px,58vh,0)}
  46.9%{opacity:.8;transform:translate3d(-15px,24vh,0)}
  47.2%{opacity:.55;transform:translate3d(11px,24vh,0)}
  89.3%{opacity:.9;transform:translate3d(-19px,86vh,0)}
}
@keyframes crtTearC{
  0%,42.1%,43.7%,68.2%,69.1%,100%{opacity:0;transform:translate3d(0,-50vh,0)}
  42.3%{opacity:.55;transform:translate3d(-25px,18vh,0)}
  42.7%{opacity:.4;transform:translate3d(16px,18vh,0)}
  43.1%{opacity:.5;transform:translate3d(-7px,18vh,0)}
  68.5%{opacity:.6;transform:translate3d(22px,67vh,0)}
  68.8%{opacity:.45;transform:translate3d(-12px,67vh,0)}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const DEFAULT_CENTER_IMG = 'https://static.wixstatic.com/media/b4f4e1_f8207eaf3d0940e9be711046d39d3c7d~mv2.jpg';

/* ═══ DIFFICULTY PRESETS ═══ */
const DIFF_CFG = {
  easy:   { spawnBase: 1600, spawnMin: 850, hitRadius: 100, lives: 3, starGoal: 5,  duration: 60 },
  medium: { spawnBase: 1111, spawnMin: 583, hitRadius: 84, lives: 3, starGoal: 7,  duration: 60 },
  hard:   { spawnBase: 850,  spawnMin: 480, hitRadius: 72, lives: 2, starGoal: 10, duration: 60 }
};

/* ═══ PALETTES (effect on SVG gradients of the flower scene) ═══ */
/* כל פלטה משפיעה על: רקע, עלי כותרת חיצוניים+פנימיים, עלים, גבעול, אגרטל, הילה */
const PALETTES = {
  default: {
    name: 'סגול', icon: '💜',
    bg: 'linear-gradient(135deg,#1a0b66 0%,#4e2291 40%,#a33a85 100%)',

    tint: 'rgba(140,60,220,0.38)',
    petalOuter: ['#0b04c9','#8735eb','#df8af2','#ffffff'],

    vaseLip:    ['#ffa1eb','#8124f0','#0a0366'],
    centerCircle: '#0b04c9',
    centerStroke: '#0802a3'
  },
  sunset: {
    name: 'שקיעה', icon: '🔥',
    bg: 'linear-gradient(135deg,#2a0340 0%,#8a1a6d 30%,#e8413d 65%,#ffd86b 100%)',
    halo: '#ff9a4d',
    tint: 'rgba(214,82,50,0.38)',
    petalOuter: ['#3a081c','#d6441f','#ffc878','#ffffff'],
    petalInner: ['#28061a','#a82e25','#ffddaa','#ffffff'],
    stem:       ['#ff4dbd','#c41a5a','#ffd86b'],
    leaf:       ['#ff66a8','#8a1a6d','#1c0420'],
    vaseDome:   ['#ffbd6b','#d6443a','#2a0428'],
    vaseLip:    ['#ffd8a8','#e05d4a','#2a0620'],
    centerCircle: '#3a081c',
    centerStroke: '#28061a'
  },
  ocean: {
    name: 'אוקיינוס', icon: '🌊',
    bg: 'linear-gradient(135deg,#081b5a 0%,#1566d6 35%,#3ec8dc 70%,#ff9fb8 100%)',
    halo: '#7ee8ff',
    tint: 'rgba(50,130,210,0.38)',
    petalOuter: ['#0a2070','#1c7fd6','#8adff5','#ffffff'],
    petalInner: ['#071858','#1566c4','#aff0f8','#ffffff'],
    stem:       ['#ff77c8','#0e5cc4','#6cecf5'],
    leaf:       ['#ff66cc','#1e50b5','#041128'],
    vaseDome:   ['#ff8ad6','#2c4ee0','#0a0d4a'],
    vaseLip:    ['#ffa8e0','#2a6dd6','#04104a'],
    centerCircle: '#0a2070',
    centerStroke: '#071858'
  }
};

/* ═══ DEFAULT STATE ═══ */
const CINEMA_TONES = {
  classic: { name: 'קלאסי', icon: '⚫' },
  sepia:   { name: 'ספיה',  icon: '🟤' },
  bleach:  { name: 'בליץ׳', icon: '🟠' }
};

const DEFAULT_STATE = {
  difficulty: 'easy',
  filter: 'original',
  palette: 'default',
  cinemaTone: 'classic',

/* ═══ HELPERS ═══ */
function loadFromHash() {
  const h = location.hash;
  if (!h || !h.startsWith('#g=')) return null;
  try {
    const json = JSON.parse(decodeURIComponent(escape(atob(h.slice(3)))));
    const s = JSON.parse(JSON.stringify(DEFAULT_STATE));
    if (json.d) s.difficulty = json.d;
    if (json.f && ['original','crt','dream','cinema'].includes(json.f)) s.filter = json.f;
    if (json.p && PALETTES[json.p]) s.palette = json.p;
    else s.palette = 'default';
    if (json.ct && CINEMA_TONES[json.ct]) s.cinemaTone = json.ct;
    if (json.t) Object.assign(s.texts, json.t);
    if (json.i) s.centerImg = json.i;
    if (json.c) Object.assign(s.crop, json.c);
    return s;
  } catch (e) { return null; }
}

function compressImage(dataUrl, maxSize, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = maxSize; c.height = maxSize;
      const cx = c.getContext('2d');
      const scale = Math.max(maxSize / img.width, maxSize / img.height);
      const w = img.width * scale, h = img.height * scale;
      cx.drawImage(img, (maxSize - w) / 2, (maxSize - h) / 2, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

async function buildShareUrl(state) {
  const data = { d: state.difficulty, f: state.filter, p: state.palette, ct: state.cinemaTone, t: state.texts, c: state.crop };
  if (state.centerImg && state.centerImg !== DEFAULT_CENTER_IMG && state.centerImg.startsWith('data:')) {
    const compressed = await compressImage(state.centerImg, 96, 0.55);
    if (compressed) data.i = compressed;
  } else if (state.centerImg && state.centerImg !== DEFAULT_CENTER_IMG) {
    data.i = state.centerImg;
  }
  const enc = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  return location.href.split('#')[0] + '#g=' + enc;
}

function showToast(msg) {
  let t = document.querySelector('.share-toast');
  if (!t) { t = document.createElement('div'); t.className = 'share-toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

const Editor = ({ state, setState, onBack, onPlay, onShare }) => {
  const previewRef = useRef(null);
  const imgRef = useRef(null);
  const [imgSrcLoaded, setImgSrcLoaded] = useState('');
  const dragRef = useRef({ active: false, sx: 0, sy: 0, sox: 0, soy: 0 });

  const palSet = PALETTES;

  /* preview canvas drawing */
  const drawPreview = () => {
    const cv = previewRef.current;
    if (!cv) return;
    const cx = cv.getContext('2d');
    const sz = cv.width;
    cx.clearRect(0, 0, sz, sz);
    cx.save();
    cx.beginPath(); cx.arc(sz/2, sz/2, sz/2, 0, Math.PI*2); cx.clip();
    cx.fillStyle = '#12121e'; cx.fillRect(0, 0, sz, sz);
    const img = imgRef.current;
    if (img && img.complete && img.naturalWidth > 0) {
      const zm = state.crop.zoom;
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const sc = Math.max(sz / iw, sz / ih) * zm;
      const dw = iw * sc, dh = ih * sc;
      const msx = Math.max(0, (dw - sz) / 2);
      const msy = Math.max(0, (dh - sz) / 2);
      cx.drawImage(img, (sz - dw) / 2 + state.crop.ox * msx, (sz - dh) / 2 + state.crop.oy * msy, dw, dh);
    }
    cx.restore();
    cx.strokeStyle = 'rgba(255,255,255,.08)'; cx.lineWidth = 2;
    cx.beginPath(); cx.arc(sz/2, sz/2, sz/2 - 1, 0, Math.PI*2); cx.stroke();
  };

  useEffect(() => {
    if (imgSrcLoaded !== state.centerImg) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { imgRef.current = img; setImgSrcLoaded(state.centerImg); drawPreview(); };
      img.onerror = () => { imgRef.current = null; setImgSrcLoaded(state.centerImg); drawPreview(); };
      img.src = state.centerImg;
    } else {
      drawPreview();
    }
  }, [state.centerImg, state.crop, imgSrcLoaded]);

  /* drag to pan */
  useEffect(() => {
    const move = (cx, cy) => {
      const d = dragRef.current;
      if (!d.active || !imgRef.current || !imgRef.current.complete) return;
      const cv = previewRef.current; if (!cv) return;
      const rect = cv.getBoundingClientRect();
      const dispSz = rect.width;
      const zm = state.crop.zoom;
      const iw = imgRef.current.naturalWidth, ih = imgRef.current.naturalHeight;
      const sc = Math.max(dispSz / iw, dispSz / ih) * zm;
      const dw = iw * sc, dh = ih * sc;
      const msx = Math.max(1, (dw - dispSz) / 2);
      const msy = Math.max(1, (dh - dispSz) / 2);
      const nox = Math.max(-1, Math.min(1, d.sox + (cx - d.sx) / msx));
      const noy = Math.max(-1, Math.min(1, d.soy + (cy - d.sy) / msy));
      setState(s => ({ ...s, crop: { ...s.crop, ox: nox, oy: noy } }));
    };
    const onMM = e => move(e.clientX, e.clientY);
    const onMU = () => { dragRef.current.active = false; };
    window.addEventListener('mousemove', onMM);
    window.addEventListener('mouseup', onMU);
    return () => { window.removeEventListener('mousemove', onMM); window.removeEventListener('mouseup', onMU); };
  }, [state.crop.zoom, setState]);

  const startDrag = (cx, cy) => {
    dragRef.current = { active: true, sx: cx, sy: cy, sox: state.crop.ox, soy: state.crop.oy };
  };

  const onUpload = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => setState(s => ({ ...s, centerImg: ev.target.result, crop: { zoom: 1, ox: 0, oy: 0 } }));
    r.readAsDataURL(f);
  };

  const setText = (k, v) => setState(s => ({ ...s, texts: { ...s.texts, [k]: v } }));

  const onPickFilter = (f) => setState(s => ({ ...s, filter: f }));

  const onShareClick = async () => {
    try {
      const url = await onShare();
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(url);
        showToast('הלינק הועתק!');
      } else {
        const ta = document.createElement('textarea');
        ta.value = url; ta.style.cssText = 'position:fixed;top:-9999px;opacity:0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); showToast('הלינק הועתק!'); }
        catch (e) { showToast('לא הצלחנו להעתיק'); }
        ta.remove();
      }
    } catch (e) { showToast('שגיאה ביצירת הלינק'); }
  };

  return (
    <>
      <div className="editor-topbar">
        <h2>עורך הניצוץ</h2>
        <div className="editor-topbar-actions">
          <button className="e-btn e-btn-back" onClick={onBack}>חזרה</button>
          <button className="e-btn e-btn-start" onClick={onPlay}>התחל משחק</button>
        </div>
      </div>
      <div id="editorScreen">
        <div className="editor-header"><p>התאם את המשחק שלך</p></div>

        {/* תמונה במרכז הפרח */}
        <div className="editor-section">
          <h3>תמונת מרכז</h3>
          <div className="asset-wrap">
            <canvas
              ref={previewRef}
              className="asset-preview"
              width="400" height="400"
              onMouseDown={e => { e.preventDefault(); startDrag(e.clientX, e.clientY); }}
              onTouchStart={e => { if (e.touches.length === 1) { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); } }}
              onTouchMove={e => {
                if (e.touches.length === 1 && dragRef.current.active) {
                  e.preventDefault();
                  const t = e.touches[0];
                  const d = dragRef.current;
                  const cv = previewRef.current; if (!cv || !imgRef.current) return;
                  const rect = cv.getBoundingClientRect();
                  const dispSz = rect.width;
                  const zm = state.crop.zoom;
                  const iw = imgRef.current.naturalWidth, ih = imgRef.current.naturalHeight;
                  const sc = Math.max(dispSz/iw, dispSz/ih) * zm;
                  const dw = iw*sc, dh = ih*sc;
                  const msx = Math.max(1,(dw-dispSz)/2), msy = Math.max(1,(dh-dispSz)/2);
                  const nox = Math.max(-1, Math.min(1, d.sox + (t.clientX - d.sx)/msx));
                  const noy = Math.max(-1, Math.min(1, d.soy + (t.clientY - d.sy)/msy));
                  setState(s => ({ ...s, crop: { ...s.crop, ox: nox, oy: noy } }));
                }
              }}
              onTouchEnd={() => { dragRef.current.active = false; }}
            />
            <div className="asset-overlay">
              <label className="upload-btn" htmlFor="centerImgFile">החלף תמונה</label>
            </div>
          </div>
          <div className="zoom-row">
            <button className="zoom-pm" type="button" onClick={() => setState(s => ({ ...s, crop: { ...s.crop, zoom: Math.max(1, +(s.crop.zoom - 0.2).toFixed(2)) } }))}>−</button>
            <input
              type="range" min="1" max="3" step="0.05"
              value={state.crop.zoom}
              className="zoom-slider"
              onChange={e => setState(s => ({ ...s, crop: { ...s.crop, zoom: parseFloat(e.target.value) } }))}
            />
            <button className="zoom-pm" type="button" onClick={() => setState(s => ({ ...s, crop: { ...s.crop, zoom: Math.min(3, +(s.crop.zoom + 0.2).toFixed(2)) } }))}>+</button>
          </div>
          <input type="file" id="centerImgFile" accept="image/*" onChange={onUpload}/>
        </div>

        {/* טקסטים */}
        <div className="editor-section">
          <h3>טקסטים</h3>
          <div className="field-group">
            <label className="field-label">כותרת פתיחה</label>
            <input className="text-field" value={state.texts.title} onChange={e => setText('title', e.target.value)}/>
          </div>
          <div className="field-group">
            <label className="field-label">כותרת משנה <span style={{opacity:.5}}>(אפשר {'{GOAL}'} למספר הניצוצות)</span></label>
            <input className="text-field" value={state.texts.subtitle} onChange={e => setText('subtitle', e.target.value)}/>
          </div>
          <div className="field-group">
            <label className="field-label">הודעת ניצחון</label>
            <input className="text-field" value={state.texts.win} onChange={e => setText('win', e.target.value)}/>
          </div>
          <div className="field-group">
            <label className="field-label">הודעת סיום זמן</label>
            <input className="text-field" value={state.texts.loseTime} onChange={e => setText('loseTime', e.target.value)}/>
          </div>
          <div className="field-group">
            <label className="field-label">הודעת פסילה</label>
            <input className="text-field" value={state.texts.loseLives} onChange={e => setText('loseLives', e.target.value)}/>
          </div>
        </div>

        {/* פילטר ויזואלי */}
        <div className="editor-section">
          <h3>סגנון ויזואלי</h3>
          <div className="filter-grid">
            {[
              { k: 'original', icon: '🌸', name: 'מקורי' },

const RadiantPoster = ({ settings, onBackToEditor, hideBackBtn }) => {

  const cfg = DIFF_CFG[settings.difficulty] || DIFF_CFG.medium;

    ? { animation: 'dreamPulse 5.6s ease-in-out infinite' }

  const isPortraitRef = useRef(window.innerHeight / window.innerWidth > 1.25);
  const [preserveAR, setPreserveAR] = useState(

  const [lives, setLives] = useState(cfg.lives);
  const [stars, setStars] = useState(0);
  const starsRef = useRef(0);
  const [starPop, setStarPop] = useState(false);

  const GAME_DURATION = cfg.duration;
  const STAR_GOAL = cfg.starGoal;
  const [timeLeft, setTimeLeft] = useState(GAME_DURATION);
  const timerIdRef = useRef(null);
  const finalStarsRef = useRef(0);
  const [endReason, setEndReason] = useState('');

  const flowerPosRef = useRef({ x: 400, y: 440 });
  const entitiesRef = useRef([]);
  const livesRef = useRef(cfg.lives);
  const lastSpawnRef = useRef(0);
  const startTimeRef = useRef(0);
  const openingBurstRef = useRef(false);
  const frameRef = useRef(null);
  const svgRef = useRef(null);
  const isPlayingRef = useRef(false);

  const indicatorsRef = useRef([]);
  const flashRef = useRef({ color: '', opacity: 0 });
  const shakeRef = useRef(0);
  const ringsRef = useRef([]);
  const comboRef = useRef(0);
  const comboTimerRef = useRef(0);
  const lastEventRef = useRef(0);
  const [bannerMsg, setBannerMsg] = useState(null);
  const bannerTimer = useRef(null);

  const audioRef = useRef(null);
  const padNodesRef = useRef(null);
  const soundOnRef = useRef(true);

  const getAC = () => {
    if (!audioRef.current) {
      try { audioRef.current = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    return audioRef.current;
  };
  const ensureAudio = () => {
    const ac = getAC(); if (!ac) return null;
    if (ac.state === 'suspended') { try { ac.resume(); } catch (e) {} }
    return ac;
  };
  const beep = (freq, dur, type='sine', vol=.18, slideTo=null) => {
    if (!soundOnRef.current) return;
    const ac = ensureAudio(); if (!ac) return;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  };
  const sndHit  = () => { beep(180, .25, 'triangle', .18, 60); };
  const sndLife = () => { beep(660, .12, 'triangle', .18, 990); setTimeout(()=>beep(990,.18,'triangle',.18,1320),90); };
  const sndCombo= () => { beep(880,.08,'triangle',.16,1200); setTimeout(()=>beep(1320,.1,'triangle',.16,1760),70); };
  const sndOver = () => { beep(220,.6,'triangle',.20,55); };
  const sndStart= () => { beep(440,.1,'sine',.16,660); setTimeout(()=>beep(660,.15,'sine',.16,880),100); };

  const startAmbient = () => {
    return; // השבתה: הסרנו את ה-drone המונוטוני של הרקע
    // eslint-disable-next-line no-unreachable
    if (!soundOnRef.current) return;
    const ac = ensureAudio(); if (!ac) return;
    if (padNodesRef.current) return;
    try {
      const oscA = ac.createOscillator();
      const oscB = ac.createOscillator();
      oscA.type = 'sine';     oscA.frequency.value = 110;
      oscB.type = 'triangle'; oscB.frequency.value = 165;
      const lp  = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 700; lp.Q.value = .7;
      const g   = ac.createGain(); g.gain.value = 0.0001;
      g.gain.exponentialRampToValueAtTime(0.045, ac.currentTime + 1.4);
      oscA.connect(lp); oscB.connect(lp); lp.connect(g); g.connect(ac.destination);
      oscA.start(); oscB.start();
      const lfo = ac.createOscillator(); lfo.frequency.value = 0.13;
      const lfoGain = ac.createGain(); lfoGain.gain.value = 14;
      lfo.connect(lfoGain); lfoGain.connect(oscB.frequency);
      lfo.start();
      padNodesRef.current = { oscA, oscB, lfo, g, ac };
    } catch (e) {}
  };
  const stopAmbient = () => {
    const nodes = padNodesRef.current;
    if (!nodes) return;
    const { oscA, oscB, lfo, g, ac } = nodes;
    try {
      g.gain.cancelScheduledValues(ac.currentTime);
      g.gain.setValueAtTime(g.gain.value || 0.0001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.5);
      oscA.stop(ac.currentTime + 0.6);
      oscB.stop(ac.currentTime + 0.6);
      lfo.stop(ac.currentTime + 0.6);
    } catch (e) {}
    padNodesRef.current = null;
  };

  const endGame = (reason) => {
    if (!isPlayingRef.current) return;
    isPlayingRef.current = false;
    finalStarsRef.current = starsRef.current;
    cancelAnimationFrame(frameRef.current);
    frameRef.current = null;
    if (timerIdRef.current) { clearInterval(timerIdRef.current); timerIdRef.current = null; }
    stopAmbient();
    sndOver();
    setEndReason(reason);
    setGameState('gameover');
  };

  const gameLoop = (time) => {
    if (!isPlayingRef.current || gameState !== 'playing') return;
    if (livesRef.current <= 0) return;

    if (lastSpawnRef.current === 0) lastSpawnRef.current = time;
    if (startTimeRef.current === 0) startTimeRef.current = time;

    const elapsedSec = (time - startTimeRef.current) / 1000;
    const spawnRate = Math.max(cfg.spawnMin, cfg.spawnBase - elapsedSec * 11.1);
    const baseSpeed = 1.05 + elapsedSec / 75;

    if (!openingBurstRef.current) {
      openingBurstRef.current = true;
      // אלמנטים הנראים כבר ברגע ההתחלה (y חיובי, מעל הפרח שב-y=440).
      // רושם ראשוני ידידותי: 2 כוכבים, לב, פרת משה רבנו. בלי דבורים/עכבישים בזריקה ראשונה.
      const burstTypes = ['star', 'heart', 'star', 'ladybug'];
      for (let k = 0; k < 4; k++) {
        const t = burstTypes[k];
        const sm = t === 'star' ? 0.6 : (t === 'heart' ? 0.7 : 0.95);
        const burstY = 80 + k * 90 + Math.random() * 40;
        const baseX = isPortraitRef.current
          ? 200 + k * 80 + (Math.random() - 0.5) * 50
          : 140 + k * 150 + (Math.random() - 0.5) * 70;
        entitiesRef.current.push({
          id: Math.random().toString(),
          x: baseX,
          y: burstY,
          baseY: burstY,
          speed: (baseSpeed + Math.random() * 0.35) * sm,
          type: t,
          rotation: (Math.random() - 0.5) * 15,
          spawnTime: time
        });
      }
    }

    if (time - lastSpawnRef.current > spawnRate) {
      const rand = Math.random();
      let type = 'bee';
      let speedMult = 1;

      // ~14% לבבות, ~50.66% כוכבים, ~16.7% עכבישים, ~9.32% פרת משה רבנו, ~9.32% דבורים
      // דבורים+פרות משה (אויבים פגיעים) הורדו ב-10% נוספים; עכבישים ולבבות ללא שינוי
      if (rand > 0.86) { type = 'heart';   speedMult = 0.7;  }
      else if (rand > 0.353412) { type = 'star';    speedMult = 0.6;  }
      else if (rand > 0.186412) { type = 'spider';  speedMult = 1.7;  }
      else if (rand > 0.0932060){ type = 'ladybug'; speedMult = 0.95; }
      else                      { type = 'bee';     speedMult = 0.9;  }

      const startY = -60 - Math.random() * 220;
      const spawnX = isPortraitRef.current ? 185 + Math.random() * 430 : 80 + Math.random() * 640;
      entitiesRef.current.push({
        id: Math.random().toString(),
        x: spawnX,
        y: startY,
        baseY: startY,
        speed: (baseSpeed + Math.random() * 0.55) * speedMult,
        type: type,
        rotation: type === 'spider' ? 0 : (Math.random() - 0.5) * 15,
        spawnTime: time
      });
      lastSpawnRef.current = time;
    }

    const hitRadius = cfg.hitRadius;

    for (let i = entitiesRef.current.length - 1; i >= 0; i--) {
      const ent = entitiesRef.current[i];
      if (ent.type === 'spider') {
        ent.baseY += ent.speed * 0.4;
        ent.y = ent.baseY + Math.sin((Date.now() - ent.spawnTime) / 400) * 150;
      } else {
        ent.y += ent.speed;
      }

      const dx = ent.x - flowerPosRef.current.x;
      const dy = ent.y - flowerPosRef.current.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < hitRadius) {
        if (ent.type === 'star') {
          starsRef.current += 1;
          setStars(starsRef.current);
          setStarPop(true); setTimeout(()=>setStarPop(false), 380);
          indicatorsRef.current.push({
            id: Math.random().toString(),
            x: ent.x, y: flowerPosRef.current.y - 20,
            kind: 'star', value: '+25',
            color: '#ffe066', opacity: 1, velocity: -1.6
          });
          flashRef.current = { color: '#ffe066', opacity: .55 };
          ringsRef.current.push({ id: Math.random().toString(), x: flowerPosRef.current.x, y: flowerPosRef.current.y, r: 38, opacity: .9, color: '#ffe066' });
          beep(1320,.08,'triangle',.18,1980);
          setTimeout(()=>beep(1760,.1,'triangle',.16,2640),70);
          setTimeout(()=>beep(2200,.12,'triangle',.14,2960),140);
          entitiesRef.current.splice(i, 1);
        } else if (ent.type === 'heart') {
          livesRef.current = Math.min(livesRef.current + 1, cfg.lives);
          setLives(livesRef.current);
          comboRef.current += 1;
          comboTimerRef.current = 90;
          indicatorsRef.current.push({
            id: Math.random().toString(),
            x: ent.x, y: flowerPosRef.current.y - 20,
            kind: 'gain', value: comboRef.current >= 2 ? `×${comboRef.current}` : '+1',
            color: '#ff4d94', opacity: 1, velocity: -1.6
          });
          flashRef.current = { color: '#ff4d94', opacity: .55 };
          ringsRef.current.push({ id: Math.random().toString(), x: flowerPosRef.current.x, y: flowerPosRef.current.y, r: 40, opacity: .9, color: '#ff4d94' });
          if (comboRef.current >= 3) sndCombo(); else sndLife();
          entitiesRef.current.splice(i, 1);
        } else {
          livesRef.current -= 1;
          setLives(livesRef.current);
          comboRef.current = 0;
          shakeRef.current = 18;
          indicatorsRef.current.push({
            id: Math.random().toString(),
            x: ent.x, y: flowerPosRef.current.y - 20,
            kind: 'loss', value: '-1',
            color: '#ff3344', opacity: 1, velocity: -1.6
          });
          flashRef.current = { color: '#ff0033', opacity: .75 };
          ringsRef.current.push({ id: Math.random().toString(), x: flowerPosRef.current.x, y: flowerPosRef.current.y, r: 35, opacity: 1, color: '#ff2244' });
          sndHit();
          entitiesRef.current.splice(i, 1);

          if (livesRef.current <= 0) {
            endGame('lives');
            return;
          }
        }
      } else if (distance < hitRadius + 28 && ent.y > flowerPosRef.current.y + 20 && lastEventRef.current !== ent.id) {
        lastEventRef.current = ent.id;
        if (ent.type !== 'heart') {
          indicatorsRef.current.push({
            id: Math.random().toString(),
            x: ent.x, y: ent.y - 20,
            kind: 'dodge', value: '',
            color: '#7af6ff', opacity: 1, velocity: -1.2
          });
          beep(1100,.06,'sine',.08,1500);
        }
      }
    }

    entitiesRef.current = entitiesRef.current.filter(ent => ent.y < 1050);

    for (let i = indicatorsRef.current.length - 1; i >= 0; i--) {
      const ind = indicatorsRef.current[i];
      ind.y += ind.velocity;
      ind.opacity -= 0.02;
      if (ind.opacity <= 0) indicatorsRef.current.splice(i, 1);
    }

    if (flashRef.current.opacity > 0) flashRef.current.opacity -= 0.03;

    for (let i = ringsRef.current.length - 1; i >= 0; i--) {
      const r = ringsRef.current[i];
      r.r += 7;
      r.opacity -= .04;
      if (r.opacity <= 0) ringsRef.current.splice(i, 1);
    }

    if (shakeRef.current > 0) shakeRef.current = Math.max(0, shakeRef.current - 1.2);
    if (comboTimerRef.current > 0) {
      comboTimerRef.current--;
      if (comboTimerRef.current === 0) comboRef.current = 0;
    }

    setRenderTick(t => t + 1);
    frameRef.current = requestAnimationFrame(gameLoop);
  };

  useEffect(() => {
    if (gameState === 'playing') {
      isPlayingRef.current = true;
      lastSpawnRef.current = 0;
      frameRef.current = requestAnimationFrame(gameLoop);

      setTimeLeft(GAME_DURATION);
      timerIdRef.current = setInterval(() => {
        setTimeLeft(prev => {
          if (prev <= 1) { endGame('time'); return 0; }
          return prev - 1;
        });
      }, 1000);

      startAmbient();
    } else {
      isPlayingRef.current = false;
      stopAmbient();
    }
    return () => {
      isPlayingRef.current = false;
      cancelAnimationFrame(frameRef.current);
      if (timerIdRef.current) { clearInterval(timerIdRef.current); timerIdRef.current = null; }
    };
  }, [gameState]);

  useEffect(() => {
    const update = () => {
      const portrait = window.innerHeight / window.innerWidth > 1.25;
      isPortraitRef.current = portrait;
      setPreserveAR(portrait ? 'xMidYMax slice' : 'xMidYMax meet');
    };
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  useEffect(() => {
    return () => {
      stopAmbient();
      if (audioRef.current) {
        try { audioRef.current.close(); } catch (e) {}
        audioRef.current = null;
      }
    };
  }, []);

  const startGame = () => {
    entitiesRef.current = [];
    indicatorsRef.current = [];
    ringsRef.current = [];
    flashRef.current = { color: '', opacity: 0 };
    shakeRef.current = 0;
    comboRef.current = 0;
    comboTimerRef.current = 0;
    livesRef.current = cfg.lives;
    setLives(cfg.lives);
    starsRef.current = 0;
    setStars(0);
    setStarPop(false);
    setBannerMsg(null);
    setTimeLeft(GAME_DURATION);
    setEndReason('');
    startTimeRef.current = 0;
    finalStarsRef.current = 0;
    openingBurstRef.current = false;
    flowerPosRef.current = { x: 400, y: 440 };
    ensureAudio();
    sndStart();
    setGameState('playing');
  };

  const updateFlowerPosition = (clientX, clientY, isTouch = false) => {
    if (gameState !== 'playing' || !svgRef.current) return;
    const pt = svgRef.current.createSVGPoint();
    pt.x = clientX;
    pt.y = clientY;
    const cursorPoint = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());

    const touchOffset = isTouch ? 110 : 0;

    const xMin = isPortraitRef.current ? 185 : 120;
    const xMax = isPortraitRef.current ? 615 : 680;
    flowerPosRef.current.x = Math.max(xMin, Math.min(xMax, cursorPoint.x));
    flowerPosRef.current.y = Math.max(120, Math.min(820, cursorPoint.y - touchOffset));
  };

  const HeartIcon = ({ size = 24, fill = '#ff4d94', glow = true }) => {
    const isCss = typeof size === 'string';
    const styleProp = {
      filter: glow ? 'drop-shadow(0 0 6px #ff4d94)' : 'none',
      transition: 'all .35s',
      ...(isCss ? { width: size, height: size } : {})
    };
    return (
      <svg {...(isCss ? {} : { width: size, height: size })}
           viewBox="0 0 24 24" fill={fill} style={styleProp}>
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    );
  };

  // חישובי תמונת מרכז עם זום ופאן
  const cropZ = settings.crop.zoom || 1;
  const cropOX = settings.crop.ox || 0;
  const cropOY = settings.crop.oy || 0;
  const baseImgSize = 164;
  const drawnImgSize = baseImgSize * cropZ;
  const maxOX = Math.max(0, (drawnImgSize - baseImgSize) / 2);
  const maxOY = Math.max(0, (drawnImgSize - baseImgSize) / 2);
  const imgX = -drawnImgSize / 2 + cropOX * maxOX;
  const imgY = -drawnImgSize / 2 + cropOY * maxOY;

  const subtitleText = settings.texts.subtitle.replace('{GOAL}', String(STAR_GOAL));

  return (
    <div dir="rtl" className={`game-stage fx-${settings.filter}${settings.filter === 'cinema' ? ' fx-cinema-' + (settings.cinemaTone || 'classic') : ''}`} style={{ background: pal.bg }}>
      {!hideBackBtn && (
        <button className="back-to-editor" onClick={onBackToEditor}>← עריכה</button>
      )}
      {settings.filter === 'crt' && (
        <>
          <div className="crt-tear crt-tear-a"/>
          <div className="crt-tear crt-tear-b"/>
          <div className="crt-tear crt-tear-c"/>
        </>
      )}
      <div style={{
        position: 'absolute', inset: 0, overflow: 'hidden',
        transform: shakeRef.current ? `translate(${(Math.random()-.5)*shakeRef.current}px,${(Math.random()-.5)*shakeRef.current}px)` : 'none'
      }}>
        {gameState !== 'playing' && (
          <div style={{
            position: 'absolute', inset: 0, zIndex: 30,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            background: 'rgba(8,0,16,.96)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)',
            padding: 'clamp(1.5rem,4vw,3rem)', textAlign: 'center'
          }}>
            {(() => {
              const isGameOver = gameState === 'gameover';
              const won = isGameOver && finalStarsRef.current >= STAR_GOAL && endReason !== 'lives';
              const n = finalStarsRef.current;

              const titleText = isGameOver
                ? (won ? settings.texts.win : (endReason === 'lives' ? settings.texts.loseLives : settings.texts.loseTime))
                : settings.texts.title;

              const titleColor = isGameOver
                ? (won ? '#ffd86b' : '#ff7a8c')
                : '#f6e3ff';

              const subText = isGameOver
                ? (won
                    ? `אספת ${n} ניצוצות. כל הכבוד!`
                    : (endReason === 'lives'
                        ? 'האויבים פגעו בך יותר מדי. נסה להתחמק'
                        : `אספת רק ${n} ניצוצות. צריך לפחות ${STAR_GOAL}`))
                : subtitleText;

              return (
                <>
                  <h1 className="display-heb" style={{
                    fontSize: 'clamp(3rem, 9vw, 6rem)',
                    margin: '0 0 clamp(.6rem,1.4vw,1.1rem)',
                    color: titleColor, lineHeight: 1.05
                  }}>{titleText}</h1>
                  <p className="heb-body" style={{
                    fontSize: 'clamp(1.05rem, 2.2vw, 1.4rem)',
                    opacity: .78, fontWeight: 400,
                    margin: '0 0 clamp(1.4rem,3vw,2.4rem)',
                    maxWidth: '36ch', color: '#fff'
                  }}>{subText}</p>
                </>
              );
            })()}

            <button onClick={startGame}
              onTouchStart={() => { ensureAudio(); }}
              className="heb-body" style={{
                fontWeight: 800,
                fontSize: 'clamp(1rem,2vw,1.25rem)',
                padding: 'clamp(.9rem,2vw,1.3rem) clamp(2rem,5vw,3.5rem)',
                background: 'linear-gradient(135deg,#411de8,#b34dff 55%,#f576cf)',
                color: '#fff', border: 'none', borderRadius: '9999px',
                boxShadow: '0 8px 32px rgba(176,77,235,.45), 0 2px 0 rgba(255,255,255,.12) inset',
                cursor: 'pointer', transition: 'transform .22s cubic-bezier(.2,1.3,.4,1)',
                letterSpacing: '-.005em', WebkitTapHighlightColor: 'transparent'
              }}
              onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.04)'}
              onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
            >
              {gameState === 'gameover'
                ? (finalStarsRef.current >= STAR_GOAL && endReason !== 'lives' ? 'משחק חדש' : 'נסה שוב')
                : 'התחל משחק'}
            </button>
          </div>
        )}

        {gameState === 'playing' && (
          <div className="hud-grid">
            <div className="hud-cell" style={{ gap: 'clamp(.5rem,1.2vw,.8rem)' }}>
              <div className="chip" style={{
                flexDirection: 'column', alignItems: 'flex-start',
                transform: starPop ? 'scale(1.12)' : 'scale(1)',
                transition: 'transform .28s cubic-bezier(.22,1.4,.5,1)'
              }}>
                <span className="chip-label" style={{ color: 'rgba(255,224,102,.7)' }}>ניצוצות</span>
                <span style={{ display: 'flex', alignItems: 'center', gap: '.45rem' }}>
                  <svg width="22" height="22" viewBox="-18 -18 36 36" style={{ filter: 'drop-shadow(0 0 5px #ffe066)' }}>
                    <defs>
                      <radialGradient id="hud-star" cx="40%" cy="35%" r="80%">
                        <stop offset="0%" stopColor="#fffbd0"/>
                        <stop offset="50%" stopColor="#ffe066"/>
                        <stop offset="100%" stopColor="#ffaa1a"/>
                      </radialGradient>
                    </defs>
                    <g>
                      <path d="M 0 -15 L 3 -3 L 15 0 L 3 3 L 0 15 L -3 3 L -15 0 L -3 -3 Z"
                            fill="url(#hud-star)" stroke="#fff" strokeWidth=".8" strokeLinejoin="round"/>
                      <circle cx="0" cy="0" r="2.2" fill="#fff"/>
                    </g>
                  </svg>
                  <span className="chip-stars-value">{stars}</span>
                </span>
              </div>
            </div>

            <div className="hud-cell center" style={{ flexDirection: 'column', gap: 'clamp(.4rem,1vw,.6rem)' }}>
              <div className="chip" style={{ flexDirection: 'column', alignItems: 'center', minWidth: 'clamp(80px,12vw,110px)' }}>
                <span className="chip-label">זמן</span>
                <span className={`chip-value ${timeLeft <= 10 ? 'timer-low' : ''}`}>
                  0:{String(timeLeft).padStart(2, '0')}
                </span>
              </div>
              {comboRef.current >= 2 && (
                <div style={{
                  display: 'flex', alignItems: 'center', gap: '.4rem',
                  fontFamily: "'Space Grotesk','Rubik',sans-serif", fontWeight: 800,
                  fontSize: 'clamp(.85rem,1.6vw,1rem)',
                  color: '#fff', background: 'linear-gradient(135deg,#ff8a3d,#ff3d8a)',
                  padding: '.3rem .7rem', borderRadius: '9999px',
                  boxShadow: '0 0 18px rgba(255,80,140,.7)',
                  animation: 'comboPulse .5s ease-in-out infinite'
                }}>
                  <HeartIcon size={14} fill="#fff" glow={false}/>
                  ×{comboRef.current}
                </div>
              )}
            </div>

            <div className="hud-cell end">
              <div className="chip" style={{ flexDirection: 'column', alignItems: 'flex-end' }}>
                <span className="chip-label">חיים</span>
                <span style={{ display: 'flex', gap: 'clamp(4px,1vw,8px)' }}>
                  {[...Array(cfg.lives)].map((_, i) => (
                    <span key={i} style={{
                      display: 'flex',
                      animation: i === lives - 1 && i < cfg.lives ? 'heartPop .4s ease' : 'none'
                    }}>
                      <HeartIcon
                        size={"clamp(20px,2.6vw,26px)"}
                        fill={i < lives ? '#ff4d94' : 'rgba(255,255,255,.12)'}
                        glow={i < lives}
                      />
                    </span>
                  ))}
                </span>
              </div>
            </div>
          </div>
        )}

        {gameState === 'playing' && lives <= 2 && (
          <div style={{ position: 'absolute', inset: 0, zIndex: 10, pointerEvents: 'none', boxShadow: 'inset 0 0 80px 20px rgba(255,30,60,.45)', animation: 'comboPulse 1.2s ease-in-out infinite' }}/>
        )}

        <svg
          ref={svgRef}
          viewBox="0 0 800 1000"
          preserveAspectRatio={preserveAR}
          style={{ width: '100%', height: '100%', display: 'block', touchAction: 'none' }}
          xmlns="http://www.w3.org/2000/svg"
          onMouseMove={e => updateFlowerPosition(e.clientX, e.clientY, false)}
          onMouseDown={() => { ensureAudio(); }}
          onTouchStart={e => { ensureAudio(); if (e.touches[0]) updateFlowerPosition(e.touches[0].clientX, e.touches[0].clientY, true); }}
          onTouchMove={e => { if (e.touches[0]) updateFlowerPosition(e.touches[0].clientX, e.touches[0].clientY, true); }}
        >
          <defs>
            <filter id="ambient-glow" x="-100%" y="-100%" width="300%" height="300%">
              <feGaussianBlur stdDeviation="30" result="blur"/>
            </filter>
            <filter id="entity-glow" x="-150%" y="-150%" width="400%" height="400%">
              <feGaussianBlur stdDeviation="20" result="blur"/>
            </filter>

            <radialGradient id="bubble-grad" cx="30%" cy="30%" r="80%">
              <stop offset="0%" stopColor="#ffffff" stopOpacity="0.9"/>
              <stop offset="25%" stopColor="#ffccf2" stopOpacity="0.3"/>
              <stop offset="70%" stopColor="#ff007f" stopOpacity="0.1"/>
              <stop offset="100%" stopColor="#ff007f" stopOpacity="0.7"/>
            </radialGradient>
            <radialGradient id="bee-body-grad" cx="40%" cy="40%" r="70%">
              <stop offset="0%" stopColor="#fffb00"/>
              <stop offset="60%" stopColor="#ff9900"/>
              <stop offset="100%" stopColor="#663300"/>
            </radialGradient>
            <radialGradient id="ladybug-body-grad" cx="40%" cy="40%" r="70%">
              <stop offset="0%" stopColor="#ff4d4d"/>
              <stop offset="70%" stopColor="#b30000"/>
              <stop offset="100%" stopColor="#330000"/>
            </radialGradient>
            <radialGradient id="spider-body-grad" cx="40%" cy="30%" r="70%">
              <stop offset="0%"   stopColor="#9933ff"/>
              <stop offset="60%"  stopColor="#330066"/>
              <stop offset="100%" stopColor="#110022"/>
            </radialGradient>
            <radialGradient id="star-grad" cx="40%" cy="35%" r="80%">
              <stop offset="0%"  stopColor="#fffbd0"/>
              <stop offset="35%" stopColor="#ffe066"/>
              <stop offset="70%" stopColor="#ffaa1a"/>
              <stop offset="100%" stopColor="#7a4a00"/>
            </radialGradient>
            <radialGradient id="star-halo" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stopColor="#ffe066" stopOpacity=".9"/>
              <stop offset="100%" stopColor="#ffe066" stopOpacity="0"/>
            </radialGradient>

            {/* פלטה דינמית */}
            <radialGradient id="petal-outer-grad" cx="50%" cy="100%" r="100%">
              <stop offset="0%"  stopColor={pal.petalOuter[0]}/>
              <stop offset="40%" stopColor={pal.petalOuter[1]}/>
              <stop offset="85%" stopColor={pal.petalOuter[2]}/>
              <stop offset="100%" stopColor={pal.petalOuter[3]}/>
            </radialGradient>
            <radialGradient id="petal-inner-grad" cx="50%" cy="100%" r="100%">
              <stop offset="0%"  stopColor={pal.petalInner[0]}/>
              <stop offset="50%" stopColor={pal.petalInner[1]}/>
              <stop offset="90%" stopColor={pal.petalInner[2]}/>
              <stop offset="100%" stopColor={pal.petalInner[3]}/>
            </radialGradient>
            <linearGradient id="stem-grad" gradientUnits="userSpaceOnUse" x1="380" y1="200" x2="420" y2="1050">
              <stop offset="0%"   stopColor={pal.stem[0]}/>
              <stop offset="60%"  stopColor={pal.stem[1]}/>
              <stop offset="100%" stopColor={pal.stem[2]}/>
            </linearGradient>
            <linearGradient id="leaf-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"   stopColor={pal.leaf[0]}/>
              <stop offset="50%"  stopColor={pal.leaf[1]}/>
              <stop offset="100%" stopColor={pal.leaf[2]}/>
            </linearGradient>
            <radialGradient id="vase-dome-grad" cx="50%" cy="15%" r="80%">
              <stop offset="0%"   stopColor={pal.vaseDome[0]}/>
              <stop offset="40%"  stopColor={pal.vaseDome[1]}/>
              <stop offset="100%" stopColor={pal.vaseDome[2]}/>
            </radialGradient>
            <linearGradient id="vase-lip-grad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%"   stopColor={pal.vaseLip[0]}/>
              <stop offset="50%"  stopColor={pal.vaseLip[1]}/>
              <stop offset="100%" stopColor={pal.vaseLip[2]}/>
            </linearGradient>

            <clipPath id="center-image-clip">
              <circle cx="0" cy="0" r="82"/>
            </clipPath>

          </defs>

          <circle
            cx={flowerPosRef.current.x}
            cy={flowerPosRef.current.y}
            r="120"
            fill={pal.halo}
            filter="url(#ambient-glow)"
            opacity="0.25"
          />

          {flashRef.current && flashRef.current.opacity > 0 && (
            <circle
              cx={flowerPosRef.current.x}
              cy={flowerPosRef.current.y}
              r="100"
              fill={flashRef.current.color}
              filter="url(#ambient-glow)"
              opacity={flashRef.current.opacity}
            />
          )}

          {ringsRef.current.map(rg => (
            <circle key={rg.id} cx={rg.x} cy={rg.y} r={rg.r} fill="none"
              stroke={rg.color} strokeWidth="3" opacity={rg.opacity}/>
          ))}

          <g id="entities" style={dreamElementsAnim}>
            {entitiesRef.current.map(ent => (
              <g key={ent.id} transform={`translate(${ent.x}, ${ent.y}) rotate(${ent.rotation}) scale(1.1)`}>
                {ent.type === 'bee' && (
                  <g>
                    <circle cx="0" cy="0" r="30" fill="#ffaa00" filter="url(#entity-glow)" opacity="0.2"/>
                    <g opacity="0.75">
                      <path d="M -5 -5 Q -25 -35 -12 -40 Q 0 -40 5 -5" fill="rgba(200, 230, 255, 0.5)" stroke="#fff" strokeWidth="0.5"/>
                      <path d="M 5 -5 Q 25 -35 12 -40 Q 0 -40 -5 -5" fill="rgba(200, 230, 255, 0.5)" stroke="#fff" strokeWidth="0.5"/>
                    </g>
                    <ellipse cx="0" cy="0" rx="16" ry="22" fill="url(#bee-body-grad)" stroke="#fff" strokeWidth="0.5" opacity="0.9"/>
                    <path d="M -14 -6 Q 0 -10 14 -6" fill="none" stroke="#221100" strokeWidth="5" strokeLinecap="round"/>
                    <path d="M -15 4 Q 0 0 15 4" fill="none" stroke="#221100" strokeWidth="5" strokeLinecap="round"/>

                {ent.type === 'ladybug' && (
                  <g>
                    <circle cx="0" cy="0" r="32" fill="#ff3344" filter="url(#entity-glow)" opacity=".3"/>
                    <g stroke="#0a0000" strokeWidth="1.8" strokeLinecap="round" fill="none">
                      <path d="M -14 -8 Q -22 -14 -26 -16"/>
                      <path d="M  14 -8 Q  22 -14  26 -16"/>
                      <path d="M -16  0 Q -24   2 -28   4"/>
                      <path d="M  16  0 Q  24   2  28   4"/>
                      <path d="M -14  8 Q -22  14 -26  18"/>
                      <path d="M  14  8 Q  22  14  26  18"/>
                    </g>
                    <ellipse cx="0" cy="-15" rx="9" ry="6" fill="#0a0000"/>
                    <path d="M -4 -19 Q -7 -24 -8 -26" stroke="#0a0000" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
                    <path d="M  4 -19 Q  7 -24  8 -26" stroke="#0a0000" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
                    <circle cx="-7" cy="-26" r="1.4" fill="#0a0000"/>
                    <circle cx=" 7" cy="-26" r="1.4" fill="#0a0000"/>
                    <circle cx="-3" cy="-15" r="1.4" fill="#fff"/>
                    <circle cx=" 3" cy="-15" r="1.4" fill="#fff"/>
                    <circle cx="-3" cy="-15" r=".6" fill="#000"/>
                    <circle cx=" 3" cy="-15" r=".6" fill="#000"/>
                    <ellipse cx="0" cy="2" rx="20" ry="19" fill="url(#ladybug-body-grad)"/>
                    <path d="M 0 -16 L 0 21" stroke="#0a0000" strokeWidth="1.6" strokeLinecap="round"/>
                    <circle cx="-9" cy="-5" r="3.2" fill="#0a0000"/>
                    <circle cx=" 9" cy="-5" r="3.2" fill="#0a0000"/>
                    <circle cx="-11" cy="7" r="3.2" fill="#0a0000"/>
                    <circle cx=" 11" cy="7" r="3.2" fill="#0a0000"/>
                    <circle cx="-6" cy="14" r="2.6" fill="#0a0000"/>
                    <circle cx=" 6" cy="14" r="2.6" fill="#0a0000"/>
                    <ellipse cx="-6" cy="-4" rx="6" ry="3.5" fill="#fff" opacity=".42" transform="rotate(-25 -6 -4)"/>
                    <ellipse cx="-9" cy="-7" rx="2" ry="1.2" fill="#fff" opacity=".75"/>
                    <path d="M -19 4 Q 0 22 19 4" stroke="rgba(80,0,0,.55)" strokeWidth="1.4" fill="none"/>
                  </g>
                )}

                {ent.type === 'spider' && (
                  <g>
                    <line x1="0" y1="-1500" x2="0" y2="0" stroke="#ffffff" strokeWidth="1" opacity="0.4"/>
                    <circle cx="0" cy="0" r="25" fill="#9933ff" filter="url(#entity-glow)" opacity="0.2"/>
                    <path d="M -10 -5 Q -25 -20 -30 -5 M -10 0 Q -30 -5 -35 10 M -10 5 Q -25 15 -25 25 M -5 10 Q -15 25 -10 35" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/>
                    <path d="M 10 -5 Q 25 -20 30 -5 M 10 0 Q 30 -5 35 10 M 10 5 Q 25 15 25 25 M 5 10 Q 15 25 10 35" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/>
                    <circle cx="0" cy="5" r="14" fill="url(#spider-body-grad)" stroke="#fff" strokeWidth="0.5"/>
                    <circle cx="0" cy="-8" r="9" fill="#111" stroke="#fff" strokeWidth="0.5"/>
                    <circle cx="-3.5" cy="-10" r="2.5" fill="#00ffff" filter="url(#entity-glow)"/>
                    <circle cx="3.5" cy="-10" r="2.5" fill="#00ffff" filter="url(#entity-glow)"/>
                    <circle cx="-3.5" cy="-10" r="1" fill="#fff"/>
                    <circle cx="3.5" cy="-10" r="1" fill="#fff"/>
                  </g>
                )}

                {ent.type === 'star' && (() => {
                  const t = Date.now();
                  const pulse = 1 + Math.sin(t / 220) * 0.07;
                  const rot = (t / 60) % 360;
                  return (
                    <g>
                      <circle cx="0" cy="0" r="36" fill="url(#star-halo)" filter="url(#entity-glow)"/>
                      <g transform={`scale(${pulse}) rotate(${rot})`}>
                        <path d="M 0 -22 Q 3 -3 22 0 Q 3 3 0 22 Q -3 3 -22 0 Q -3 -3 0 -22 Z"
                              fill="url(#star-grad)" stroke="#fff" strokeWidth="1.1" strokeLinejoin="round"/>
                        <circle cx="0" cy="0" r="3" fill="#fff" opacity=".95"/>
                        <circle cx="0" cy="0" r="1.4" fill="#fffbe0"/>
                      </g>
                      <g transform={`rotate(${-rot * 1.3}) scale(${1 + Math.sin(t/300)*0.12})`} opacity=".82">
                        <path d="M 0 -12 Q 1.6 -1.6 12 0 Q 1.6 1.6 0 12 Q -1.6 1.6 -12 0 Q -1.6 -1.6 0 -12 Z"
                              fill="#fff" opacity=".55"/>
                      </g>
                      <g opacity=".85" stroke="#fff" strokeWidth="1.1" strokeLinecap="round">
                        <line x1="16" y1="-16" x2="20" y2="-20"/>
                        <line x1="-16" y1="16" x2="-20" y2="20"/>
                        <line x1="16" y1="16" x2="20" y2="20"/>
                        <line x1="-16" y1="-16" x2="-20" y2="-20"/>
                      </g>
                    </g>
                  );
                })()}

                {ent.type === 'heart' && (
                  <g transform={`scale(${1.1 + Math.sin(Date.now() / 150) * 0.05})`}>
                    <circle cx="0" cy="0" r="24" fill="#ff007f" filter="url(#entity-glow)" opacity="0.6"/>
                    <circle cx="0" cy="0" r="22" fill="url(#bubble-grad)" stroke="#ff66b3" strokeWidth="1.5"/>
                    <path d="M -12 -14 A 18 18 0 0 1 12 -14" fill="none" stroke="#ffffff" strokeWidth="2" strokeLinecap="round" opacity="0.8"/>
                    <ellipse cx="-8" cy="-10" rx="4" ry="2" fill="#ffffff" opacity="0.9" transform="rotate(-40 -8 -10)"/>
                    <g transform={`scale(${0.8 + Math.sin(Date.now() / 100) * 0.1})`}>
                      <path d="M 0 -2 C -6 -8, -13 -4, -13 2 C -13 8, 0 16, 0 16 C 0 16, 13 8, 13 2 C 13 -4, 6 -8, 0 -2 Z"
                            fill="#ffffff" filter="url(#entity-glow)"/>
                      <path d="M 0 -2 C -6 -8, -13 -4, -13 2 C -13 8, 0 16, 0 16 C 0 16, 13 8, 13 2 C 13 -4, 6 -8, 0 -2 Z"
                            fill="#ffffff"/>
                    </g>
                    <g transform={`rotate(${Date.now() / 8 % 360})`}>
                      <circle cx="22" cy="0" r="2.5" fill="#ffffff" filter="url(#entity-glow)"/>
                      <circle cx="22" cy="0" r="1.5" fill="#ffffff"/>
                      <circle cx="-22" cy="0" r="2.5" fill="#ffffff" filter="url(#entity-glow)"/>
                      <circle cx="-22" cy="0" r="1.5" fill="#ffffff"/>
                    </g>
                  </g>
                )}
              </g>
            ))}
          </g>

          <g id="stems-and-leaves" style={dreamElementsFx}>
            {(() => {
              const startX = 400;
              const startY = 1050;
              const endX = flowerPosRef.current.x;
              const endY = flowerPosRef.current.y;
              const cpX = 400;
              const cpY = startY - (startY - endY) * 0.4;
              const getBezierPoint = (t) => {
                const invT = 1 - t;
                const x = invT * invT * startX + 2 * invT * t * cpX + t * t * endX;
                const y = invT * invT * startY + 2 * invT * t * cpY + t * t * endY;
                const dx = 2 * invT * (cpX - startX) + 2 * t * (endX - cpX);
                const dy = 2 * invT * (cpY - startY) + 2 * t * (endY - cpY);
                const angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
                return { x, y, angle };
              };
              const leaf1 = getBezierPoint(0.35);
              const leaf2 = getBezierPoint(0.65);
              return (
                <>
                  <path
                    d={`M ${startX} ${startY} Q ${cpX} ${cpY} ${endX} ${endY}`}
                    stroke="url(#stem-grad)"
                    strokeWidth="12"
                    fill="none"
                    strokeLinecap="round"
                  />
                  <g transform={`translate(${leaf1.x}, ${leaf1.y}) rotate(${leaf1.angle}) scale(0.68)`}>
                    <path d="M 5 25 Q -130 -15 -160 -120 Q -100 -65 -5 -25 Z" fill="url(#leaf-grad)"/>
                  </g>
                  <g transform={`translate(${leaf2.x}, ${leaf2.y}) rotate(${leaf2.angle}) scale(0.68)`}>
                    <path d="M 5 15 Q 130 -15 190 -115 Q 100 -50 0 -15 Z" fill="url(#leaf-grad)"/>
                  </g>
                </>
              );
            })()}
          </g>

          <g id="flowers">
            <g transform={`translate(${flowerPosRef.current.x}, ${flowerPosRef.current.y}) scale(0.82)`}>
              <g style={dreamElementsAnim}>
                <g transform="scale(0.9) rotate(22.5)">
                  {petalAngles.map(angle => (
                    <path key={`outer-${angle}`}
                      transform={`rotate(${angle})`}
                      d="M 0 0 C -55 -45, -75 -155, 0 -170 C 75 -155, 55 -45, 0 0"
                      fill="url(#petal-outer-grad)"
                      stroke="#ffffff"
                      strokeWidth="2"
                      opacity="0.95"/>
                  ))}
                </g>
                {petalAngles.map(angle => (
                  <path key={`inner-${angle}`}
                    transform={`rotate(${angle})`}
                    d="M 0 0 C -40 -35, -55 -115, 0 -125 C 55 -115, 40 -35, 0 0"
                    fill="url(#petal-inner-grad)"
                    stroke="#ffffff"
                    strokeWidth="1.2"
                    opacity="0.95"/>
                ))}
                <circle cx="0" cy="0" r="90" fill="none" stroke="url(#petal-inner-grad)" strokeWidth="6" opacity="0.6"/>
                <circle cx="0" cy="0" r="85" fill="none" stroke="#ffffff" strokeWidth="2" opacity="0.8"/>
              </g>
              <circle cx="0" cy="0" r="82" fill={pal.centerCircle}/>
              <g clipPath="url(#center-image-clip)">
                <image
                  href={settings.centerImg}
                  x={imgX}
                  y={imgY}
                  width={drawnImgSize}
                  height={drawnImgSize}
                  preserveAspectRatio="xMidYMid slice"
                  style={{
                    filter:
                      settings.filter === 'dream'  ? 'saturate(1.15) brightness(1.06)' :
                      settings.filter === 'cinema' ? (
                        settings.cinemaTone === 'sepia'  ? 'grayscale(.25) sepia(.75) contrast(1.05) brightness(1.04)' :
                        settings.cinemaTone === 'bleach' ? 'grayscale(.45) contrast(1.15) saturate(.8) brightness(1.08)' :
                        'grayscale(1) contrast(1.05) brightness(1.04)'
                      ) :
                      settings.filter === 'crt'    ? 'saturate(1.45) contrast(1.12) brightness(1.04)' :
                      undefined
                  }}
                />
                {settings.filter === 'original' && (
                  <circle cx="0" cy="0" r="82" fill={pal.tint} style={{ mixBlendMode: 'multiply' }}/>
                )}
                {settings.filter === 'dream' && (
                  <>
                    <circle cx="0" cy="0" r="82" fill={pal.halo} opacity="0.28" style={{ mixBlendMode: 'screen' }}/>
                    <circle cx="0" cy="0" r="82" fill={pal.petalInner[0]} opacity="0.14" style={{ mixBlendMode: 'overlay' }}/>
                  </>
                )}
                {settings.filter === 'cinema' && settings.cinemaTone === 'classic' && (
                  <circle cx="0" cy="0" r="82" fill="#000" opacity="0.18" style={{ mixBlendMode: 'multiply' }}/>
                )}
                {settings.filter === 'cinema' && settings.cinemaTone === 'sepia' && (
                  <>
                    <circle cx="0" cy="0" r="82" fill="#3a200c" opacity="0.22" style={{ mixBlendMode: 'multiply' }}/>
                    <circle cx="0" cy="0" r="82" fill="#f4c878" opacity="0.2" style={{ mixBlendMode: 'overlay' }}/>
                  </>
                )}
                {settings.filter === 'cinema' && settings.cinemaTone === 'bleach' && (
                  <>
                    <circle cx="0" cy="0" r="82" fill="#2a2018" opacity="0.18" style={{ mixBlendMode: 'multiply' }}/>
                    <circle cx="0" cy="0" r="82" fill="#e8d8b8" opacity="0.16" style={{ mixBlendMode: 'overlay' }}/>
                  </>
                )}
                {settings.filter === 'crt' && (
                  <>
                    <circle cx="0" cy="0" r="82" fill="#ff0080" opacity="0.18" style={{ mixBlendMode: 'screen' }}/>
                    <circle cx="0" cy="0" r="82" fill="#00d4ff" opacity="0.14" style={{ mixBlendMode: 'screen' }}/>
                  </>
                )}
              </g>
              <circle cx="0" cy="0" r="82" fill="none" stroke={pal.centerStroke} strokeWidth="4" opacity="0.4" style={{ mixBlendMode: 'multiply' }}/>
            </g>
          </g>

          <g id="vase">
            <ellipse cx="400" cy="975" rx="140" ry="85" fill="url(#vase-dome-grad)"/>
            <rect x="335" y="888" width="130" height="25" rx="12" fill="url(#vase-lip-grad)"/>
            <path d="M 345 893 L 455 893" stroke="#ffffff" strokeWidth="2" strokeLinecap="round" opacity="0.3"/>
          </g>

          <g id="indicators">
            {indicatorsRef.current.map(ind => (
              <g key={ind.id} opacity={ind.opacity} transform={`translate(${ind.x},${ind.y})`}>
                {ind.kind === 'gain' && (
                  <g>
                    <circle cx="0" cy="0" r="22" fill={ind.color} filter="url(#entity-glow)" opacity=".55"/>
                    <g transform="translate(-22,-22) scale(1.85)">
                      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4d94" stroke="#fff" strokeWidth="1"/>
                    </g>
                    <text x="26" y="6" fill="#fff" fontSize="26" fontWeight="900" textAnchor="start"
                          style={{ fontFamily: 'Space Grotesk,system-ui,sans-serif' }}
                          stroke="#ff4d94" strokeWidth="1.2" paintOrder="stroke">
                      {ind.value}
                    </text>
                  </g>
                )}

                {ind.kind === 'loss' && (
                  <g>
                    <circle cx="0" cy="0" r="22" fill={ind.color} filter="url(#entity-glow)" opacity=".7"/>
                    <g transform="translate(0,0) scale(1.7)">
                      <path d="M0 12 L-2 6 L 1 2 L-2 -2 L 1 -6 C-3 -10,-10 -7,-10 -1 C-10 4,0 12,0 12 Z" fill="#ff3344" stroke="#fff" strokeWidth=".9"/>
                      <path d="M3 12 L5 6 L 2 2 L 5 -2 L 2 -6 C 6 -10,13 -7,13 -1 C13 4,3 12,3 12 Z" fill="#ff3344" stroke="#fff" strokeWidth=".9" transform="translate(2,1)"/>
                    </g>
                    <text x="26" y="6" fill="#fff" fontSize="26" fontWeight="900" textAnchor="start"
                          style={{ fontFamily: 'Space Grotesk,system-ui,sans-serif' }}
                          stroke="#ff3344" strokeWidth="1.2" paintOrder="stroke">
                      {ind.value}
                    </text>
                  </g>
                )}

                {ind.kind === 'star' && (
                  <g>
                    <circle cx="0" cy="0" r="22" fill={ind.color} filter="url(#entity-glow)" opacity=".7"/>
                    <path d="M 0 -16 L 4.7 -5 L 16 -5 L 7.2 2 L 10.5 13 L 0 6.5 L -10.5 13 L -7.2 2 L -16 -5 L -4.7 -5 Z" fill="url(#star-grad)" stroke="#fff" strokeWidth="1.2" strokeLinejoin="round"/>
                    <text x="22" y="6" fill="#fff" fontSize="24" fontWeight="900" textAnchor="start"
                          style={{ fontFamily: 'Space Grotesk,system-ui,sans-serif' }}
                          stroke="#ffaa1a" strokeWidth="1.2" paintOrder="stroke">
                      {ind.value}
                    </text>
                  </g>
                )}

                {ind.kind === 'dodge' && (
                  <g>
                    <circle cx="0" cy="0" r="20" fill={ind.color} filter="url(#entity-glow)" opacity=".55"/>
                    <path d="M -2 -16 L 6 -2 L 0 -2 L 4 16 L -8 0 L -2 0 Z" fill="#7af6ff" stroke="#fff" strokeWidth="1.2" strokeLinejoin="round"/>
                  </g>
                )}
              </g>
            ))}
          </g>
        </svg>

        <svg className="noise-overlay" preserveAspectRatio="none" viewBox="0 0 1000 1000" aria-hidden="true">
          <defs>
            <filter id="noise-fs">
              <feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="4" stitchTiles="stitch"/>
              <feColorMatrix type="saturate" values="0"/>
            </filter>
          </defs>
          <rect width="1000" height="1000" fill="white" filter="url(#noise-fs)"/>
        </svg>
      </div>
    </div>
  );
};

/* ═══ TOP-LEVEL APP ═══ */
const App = () => {
  const initial = loadFromHash();
  const [state, setState] = useState(initial || DEFAULT_STATE);
  const [mode, setMode] = useState(initial ? 'game' : 'welcome');
  const fromHashRef = useRef(!!initial);

  useEffect(() => {
    document.documentElement.classList.toggle('mode-game', mode === 'game');
  }, [mode]);

  if (mode === 'welcome') {
    return <Welcome onPlay={() => setMode('game')} onEdit={() => setMode('editor')}/>;
  }

  if (mode === 'editor') {
    return (
      <Editor
        state={state}
        setState={setState}
        onBack={() => setMode('welcome')}
        onPlay={() => setMode('game')}
        onShare={() => buildShareUrl(state)}
      />
    );
  }

  return (
    <RadiantPoster
      settings={state}
      hideBackBtn={fromHashRef.current}
      onBackToEditor={() => setMode('editor')}
    />
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
